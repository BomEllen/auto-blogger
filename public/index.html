  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 네비게이션 바 -->
  <nav class="main-nav" id="navRoot"></nav>

  <!-- 배경 블롭 -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <!-- 페이지 콘텐츠 마운트 지점 -->
  <div id="pageRoot"></div>

  <!-- 라이트박스 (공유) -->
  <div class="lightbox hidden" id="lightbox">
    <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
    <div class="lightbox-content">
      <button class="lightbox-close" id="lightboxClose" title="닫기">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" width="18" height="18">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
      <img id="lightboxImg" src="" alt="미리보기" />
      <span class="lightbox-num" id="lightboxNum"></span>
    </div>
  </div>

  <!-- 커스텀 모달 (공유) -->
  <div class="modal-overlay hidden" id="customModal">
    <div class="modal-bd" id="modalBd"></div>
    <div class="modal-box">
      <p class="modal-message" id="modalMessage"></p>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <!-- 복사 토스트 (공유) -->
  <div class="copy-toast hidden" id="copyToast">복사됐어요!</div>

  <script type="module" src="app.js"></script>
</body>
</html>
